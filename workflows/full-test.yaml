## Quick Abort on First Failure

```powershell
function Invoke-Step {
    param([string]$Name, [scriptblock]$Cmd)
    Write-Host "`n=== $Name ==="
    & $Cmd
    if ($LASTEXITCODE -ne 0) {
        Write-Host "[ABORT] $Name failed — stopping here"
        exit 1
    }
    Write-Host "[OK] $Name passed"
}

Invoke-Step "Lint" { npm run lint }
Invoke-Step "Type-check" { npx tsc --noEmit }
Invoke-Step "Unit tests" { npm test }
Invoke-Step "Build" { npm run build }
Invoke-Step "E2E" { playwright test }
```

## CI Integration

```yaml
# .github/workflows/full-test.yml
name: Full Test Cycle
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - run: npm ci
      - run: npm run lint
      - run: npx tsc --noEmit
      - run: npm test
      - run: npm run build
      - run: npx playwright install --with-deps
      - run: playwright test
```

## When to Skip Layers

| Situation | Skip |
|-----------|------|
| Only changed Markdown/docs | Skip lint, type-check, tests, build |
| Only changed CSS | Skip Python/Go tests |
| Hotfix with no test coverage | Run at minimum: lint + type-check |
| Dependency-only change | Run full audit, skip E2E |
