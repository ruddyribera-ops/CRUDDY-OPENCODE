# Full Test Cycle Workflow

## When to Use

- Before merging a PR
- After any multi-file feature change
- As a CI quality gate (before deploy)
- When `code-builder` completes a POA

## Principle

Run **all** verification layers. One passing layer doesn't prove the others pass.

```
lint → type-check → unit-tests → build → e2e
```

If **any** layer fails → STOP. Fix before continuing.

## Auto-Detection

The workflow auto-detects the project stack from file presence:

| Files found | Stack | Layers to run |
|---|---|---|
| `package.json` | Node/JS/TS | lint, type-check, unit, build |
| `requirements.txt` / `pyproject.toml` | Python | lint, type-check, unit |
| `Cargo.toml` | Rust | clippy, test, build |
| `Dockerfile` | Docker | docker build |

## Step 1 — Detect Stack

```powershell
$hasPackage = Test-Path "package.json"
$hasPyproject = (Test-Path "requirements.txt") -or (Test-Path "pyproject.toml")
$hasCargo = Test-Path "Cargo.toml"
$hasDockerfile = Test-Path "Dockerfile"

Write-Host "Detected stack:"
if ($hasPackage) { Write-Host "  [+] Node/JS/TS" }
if ($hasPyproject) { Write-Host "  [+] Python" }
if ($hasCargo) { Write-Host "  [+] Rust" }
if ($hasDockerfile) { Write-Host "  [+] Docker" }
```

## Step 2 — Lint

### Node/JS/TS

```powershell
if ($hasPackage) {
    Write-Host "`n[LINT] Running ESLint..."
    npm run lint --if-present
    if ($LASTEXITCODE -ne 0) {
        Write-Host "[FAIL] Lint failed"
        exit 1
    }
}
```

### Python

```powershell
if ($hasPyproject) {
    Write-Host "`n[LINT] Running ruff..."
    ruff check .
    if ($LASTEXITCODE -ne 0) { exit 1 }

    Write-Host "[LINT] Running flake8..."
    flake8 --max-line-length=120 .
    if ($LASTEXITCODE -ne 0) { exit 1 }
}
```

## Step 3 — Type Check

### Node/JS/TS

```powershell
if ($hasPackage) {
    Write-Host "`n[TYPE] Running TypeScript..."
    npx tsc --noEmit
    if ($LASTEXITCODE -ne 0) {
        Write-Host "[FAIL] Type check failed"
        exit 1
    }
}
```

### Python

```powershell
if ($hasPyproject) {
    Write-Host "`n[TYPE] Running PyRight..."
    pyright .
    if ($LASTEXITCODE -ne 0) {
        Write-Host "[WARN] PyRight found type errors — review and fix"
        exit 1
    }
}
```

## Step 4 — Unit Tests

### Node/JS/TS

```powershell
if ($hasPackage) {
    Write-Host "`n[TEST] Running Jest/Vitest..."
    npm test
    if ($LASTEXITCODE -ne 0) { exit 1 }
}
```

### Python

```powershell
if ($hasPyproject) {
    Write-Host "`n[TEST] Running pytest..."
    pytest -v --tb=short
    if ($LASTEXITCODE -ne 0) { exit 1 }
}
```

### Rust

```powershell
if ($hasCargo) {
    Write-Host "`n[TEST] Running cargo test..."
    cargo test --all-targets
    if ($LASTEXITCODE -ne 0) { exit 1 }

    Write-Host "`n[CLIPPY] Running clippy..."
    cargo clippy --all-targets -- -D warnings
    if ($LASTEXITCODE -ne 0) { exit 1 }
}
```

## Step 5 — Build

```powershell
if ($hasPackage) {
    Write-Host "`n[BUILD] Running production build..."
    npm run build
    if ($LASTEXITCODE -ne 0) {
        Write-Host "[FAIL] Build failed"
        exit 1
    }
}
```

## Step 6 — E2E Smoke (Playwright)

```powershell
# Only if playwright is installed
$playwrightAvailable = Get-Command playwright -ErrorAction SilentlyContinue

if ($playwrightAvailable) {
    Write-Host "`n[E2E] Running Playwright smoke tests..."

    # Check if we're in the right directory
    if (-not (Test-Path "tests/e2e")) {
        Write-Host "[SKIP] No e2e tests found"
    } else {
        playwright test tests/e2e --reporter=list
        if ($LASTEXITCODE -ne 0) { exit 1 }
    }
} else {
    Write-Host "`n[E2E] Playwright not available — skipping"
}
```

## Step 7 — Dependency Audit

```powershell
if ($hasPackage) {
    Write-Host "`n[AUDIT] Running npm audit..."
    npm audit --audit-level=high
    # Only fail on high/critical — low is informational
}

if ($hasPyproject) {
    Write-Host "`n[AUDIT] Running pip audit..."
    pip-audit -r requirements.txt --fail-on high,critical
}
```

