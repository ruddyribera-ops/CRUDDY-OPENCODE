name: Math Platform Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
  BACKEND_SERVICE_ID: ${{ secrets.MATH_PLATFORM_BACKEND_SERVICE_ID }}
  FRONTEND_SERVICE_ID: ${{ secrets.MATH_PLATFORM_FRONTEND_SERVICE_ID }}

jobs:
  test-backend:
    runs-on: ubuntu-latest
    name: Test Backend (FastAPI)

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: test_math_platform
          POSTGRES_PASSWORD: testpass
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          cd backend && pip install -r requirements.txt

      - name: Run backend tests
        run: |
          cd backend
          pytest tests/ -v --tb=short
        env:
          DATABASE_URL: postgresql://postgres:testpass@localhost:5432/test_math_platform

  test-frontend:
    runs-on: ubuntu-latest
    name: Test Frontend (Next.js)

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Run frontend lint
        run: cd frontend && npm run lint --if-present

      - name: Build frontend
        run: cd frontend && npm run build

  deploy-backend:
    needs: test-backend
    runs-on: ubuntu-latest
    name: Deploy Backend to Railway
    if: success()

    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy backend
        run: |
          railway up --service ${{ env.BACKEND_SERVICE_ID }} --force
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          WORKING_DIRECTORY: backend

      - name: Run migrations
        run: |
          echo "Migrations handled by app startup (alembic upgrade head)"

  deploy-frontend:
    needs: test-frontend
    runs-on: ubuntu-latest
    name: Deploy Frontend to Railway
    if: success()

    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy frontend
        run: |
          railway up --service ${{ env.FRONTEND_SERVICE_ID }} --force
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          WORKING_DIRECTORY: frontend

  verify:
    needs: [deploy-backend, deploy-frontend]
    runs-on: ubuntu-latest
    name: Verify Deployment
    if: success()

    steps:
      - name: Wait for services
        run: sleep 20

      - name: Notify success
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ Math Platform deployed (backend + frontend)\n\n**Note:** Docker Compose restarts on cold deploy. If schema changed, backend will run migrations automatically.'
            })

  notify-failure:
    runs-on: ubuntu-latest
    if: failure()
    name: Notify Failure

    steps:
      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '❌ Math Platform deployment failed. Backend or frontend tests did not pass. Check workflow logs.'
            })
