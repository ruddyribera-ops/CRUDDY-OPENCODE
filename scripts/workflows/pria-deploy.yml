name: PRIA Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:  # Manual trigger from GitHub UI

env:
  RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
  SERVICE_ID: ${{ secrets.RAILWAY_SERVICE_ID }}

jobs:
  test:
    runs-on: ubuntu-latest
    name: Test PRIA

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-timeout

      - name: Run tests
        run: pytest tests/ -v --tb=short --timeout=30
        continue-on-error: false

  deploy:
    needs: test
    runs-on: ubuntu-latest
    name: Deploy to Railway
    if: success()

    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        run: |
          railway up --service ${{ env.SERVICE_ID }} --force
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Verify deployment
        run: |
          sleep 10
          # Optional: curl health endpoint to verify
          echo "PRIA deployed successfully"

      - name: Notify success
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ PRIA deployed to Railway successfully'
            })

  notify-failure:
    runs-on: ubuntu-latest
    if: failure()
    name: Notify Failure

    steps:
      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '❌ PRIA deployment failed. Tests did not pass. Check workflow logs.'
            })
