# Per-agent token budgets
# IMPORTANT: Enforcement is via scripts/track-tokens.ps1 -Action check
# Coordinator MUST call track-tokens.ps1 -Action check BEFORE routing to any agent
# with estimated tokens. Exit codes: 0=GO, 1=REJECT, 2=WARN
#
# How enforcement works:
#   1. Coordinator calls: track-tokens.ps1 -Action check -Agent <agent> -Tokens <estimated>
#   2. Script reads budgets.yaml for limits
#   3. Script reads token_budget.yaml for current usage
#   4. Returns REJECT (exit 1) for hard limits, WARN (exit 2) for soft limits
#
# enforcement modes:
#   hard = reject the task (exit 1)
#   soft = warn but allow (exit 2)
#   reset: daily at midnight

# Per-session limits per agent (tokens)
per_session:
  code-builder: 50000
  bug-fixer: 30000
  code-analyzer: 20000
  architecture-advisor: 25000
  project-generator: 40000
  skill-manager: 15000
  code-explainer: 10000
  standup-summary: 5000
  main-coordinator: 10000
  default: 15000

# Per-task limits
per_task:
  default: 8000
  code-builder: 12000
  project-generator: 15000

# Enforcement modes
enforcement:
  per_session: hard
  per_task: soft

# Token estimation
estimation:
  token_ratio: 4.0
  overhead_per_call: 500

# Tracking method
tracking:
  method: token_budget_yaml
  minimal_overhead: true