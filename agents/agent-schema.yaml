# Agent Manifest Schema v2.0
# DEPRECATED — The canonical schema is now agents/agent.schema.json (JSON Schema draft-07)
# This YAML file is kept as a human-readable reference only.
# DO NOT edit this file directly — edit agent.schema.json and regenerate from it.
#
# Usage: This schema is referenced by validate-manifests.ps1
# to ensure every agent manifest conforms to the expected structure.
#
# Last updated: 2026-07-01
# Canonical: agents/agent.schema.json

_meta:
  description: "Canonical schema for agent manifest files in agents/ directory."
  canonical: "agents/agent.schema.json"
  schema_version: "2.0"

required:
  - name
  - description

fields:
  name:
    type: string
    pattern: "^[a-z][a-z0-9-]*$"
    description: "Unique agent identifier, matching the YAML filename (minus .yaml)"

  description:
    type: string
    minLength: 10
    description: "One-line summary of the agent's purpose"

  version:
    type: string
    pattern: "^\\d+\\.\\d+\\.\\d+$"
    description: "SemVer version string"

  model:
    type: string
    description: "Model identifier (e.g., minimax/minimax-m2.7)"

  model_tier:
    type: integer
    minimum: 1
    maximum: 3
    description: "1=Flash, 2=Pro, 3=M2.7"

  mode:
    enum: [primary, subagent]
    description: "Whether this is a primary agent (user-facing) or subagent (delegated)"

  color:
    type: string
    description: "Hex color code for UI"

  emoji:
    type: string
    description: "Emoji identifier for the agent"

  vibe:
    type: string
    description: "One-line personality description"

  triggers:
    type: array
    items:
      type: string
    description: "Phrases that activate this agent"

  trigger_words:
    type: array
    items:
      type: string

  anti_triggers:
    type: array
    items:
      type: string
    description: "Phrases that should NOT route to this agent"

  skills:
    type: array
    items:
      type: string
    description: "Skills this agent can use"

  tools:
    type: object
    description: "Tool permission overrides"

  permission:
    type: object
    description: "Permission overrides for this agent"

  budget:
    type: object
    description: "Token budget overrides"

  mcp:
    type: array
    items:
      type: string
    description: "MCP tools this agent can use"

  escalation:
    type: object
    description: "When/how to escalate to other agents"

  handoff_targets:
    type: array
    items:
      type: object
    description: "Agents this agent can hand off to"

  prompt_file:
    type: string
    description: "Path to the agent's prompt file (.md)"

  steps:
    type: integer
    description: "Max steps for this agent's session"

  tone:
    type: string
    description: "Tone/persona instructions"

  never_do:
    type: array
    items:
      type: string
    description: "Explicit anti-patterns the agent must avoid"

  duties:
    type: array
    items:
      type: string
    description: "Primary duties/responsibilities"

  guardrails:
    type: array
    items:
      type: string
    description: "Safety guardrails the agent must respect"
