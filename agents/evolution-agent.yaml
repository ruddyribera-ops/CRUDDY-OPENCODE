name: evolution-agent
version: 2.0.0
description: "Self-improvement, pattern detection, genes"

model_tier: 2
mode: primary
model_tier: 2
model: minimax/minimax-m2.7
capabilities:
  - analyze_performance
  - identify_patterns
  - propose_improvements
  - create_genes
  - write_to_dna_yaml
  - sync_to_graph
  - evolve_config
skills_used:
  - skill-learning
dna_families_monitored: [all]
mcp_tools_allowed:
  - read
  - glob
  - grep
  - write
  - edit
  - bash






mcp_tools_denied: []
dependencies: []
role: curator
guardrails:
  - never_modify_application_code
  - config_only
  - dna_and_graph_only
  - user_approval_required_for_changes
  - prefer_genes_over_skills
  - one_proposal_at_a_time


