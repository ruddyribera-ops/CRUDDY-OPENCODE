# Skill Evaluation Test Cases
# Add this file to any skill folder to define test cases
#
# Usage: node scripts/skill-eval.js <skill-name>

name: "Skill Name"
description: "What this skill does"

cases:
  - name: "Test case 1: Basic functionality"
    input: "User prompt that triggers the skill"
    expected_files:
      - "output/file.txt"
    validation: "file_contains(output/file.txt, 'expected content')"
    
  - name: "Test case 2: Error handling"
    input: "Invalid input that should fail"
    expected_error: "validation_error"
    
  - name: "Test case 3: Edge case"
    input: "Edge case input"
    expected_files:
      - "result.json"
    validation: "json_valid(result.json)"

# Each test case runs the skill with the input and validates:
# - expected_files: files that should exist after execution
# - validation: JS expression to validate the output
# - expected_error: if the skill should fail with a specific error