# ============================================================
# SKILLS DNA — Behavioral Gene Repository v3.0
# Replaces bloated 10-field genes with compact 4-field format.
# Load: session pre-load + keyword match.
# Format: 5-10 lines per gene. Minimal. No filler.
# ============================================================

version: 3.0.0
generated: 2026-05-22

# ── Genes that auto-load at EVERY session start ──────────
# These are always available. No keyword match needed.
session_start_genes:
  - GENE-000  # system_identity — never strip

# ── Memory Tiers ──────────────────────────────────────────
memory_tiers:
  high_velocity:
    files: [current_sprint.md, session_log.md, schedule.yaml]
    storage: file-based
  architectural:
    entities:
      - entity_type: Rule
        source: feedback_*.md
      - entity_type: Project
        source: project_*.md
      - entity_type: Pattern
        source: lessons_learned.md
      - entity_type: Gene
        source: skills/DNA.yaml
    storage: memory-MCP-graph
  migration_sop: memory/GRAPH_MIGRATION_SOP.md

# ── BEHAVIORAL GENES ─────────────────────────────────────
# Each gene: id, name, description (what the LLM reads), triggers (keyword match).
# No family (derived from ID prefix), no conflict_tags (handled by COORD-003),
# no agent field (handled by agent_gene_map below).
# ─────────────────────────────────────────────────────────

genes:
  # ── BOOT: System Identity (never stripped) ──────────────
  - id: GENE-000
    name: system_identity
    description: |
      OpenCode v2.0 — Solo Dev AI Orchestrator. Built for Ruddy Ribera.
      Identity: EdTech founder, 7 active projects, Bolivia-based, Spanish-first.
      Core values: speed > ceremony, autonomy > permission, working software > docs.
      Never loses this persona regardless of AGENTS.md stripping.
    triggers: ["*"]

  # ── AUTH: Passwords, JWT, sessions, rate limits ─────────
  - id: AUTH-001
    name: password_hash_bcrypt
    description: |
      Passwords: bcrypt cost >=12 OR argon2id. Never MD5/SHA/plain/custom.
      DB: PostgreSQL rejects Python True/False in INTEGER - use BOOLEAN.
      Same error for "user not found" AND "wrong password" -> "invalid credentials".
    triggers: [password, hash, bcrypt, argon2, encrypt, credential]

  - id: AUTH-002
    name: jwt_secure_config
    description: |
      JWT: HS256 minimum, sub+exp claims required. Secret >=256bits from env.
      Access token: 15-30min. Refresh: 7-30 days. Blacklist on logout.
      Cookies: HttpOnly+Secure+SameSite=Lax. Never localStorage for tokens.
      Password change: require current pw, invalidate ALL other sessions.
      Password reset: 1-hour single-use token, invalidate ALL sessions.
    triggers: [jwt, token, login, auth, session-cookie]

  - id: AUTH-003
    name: rate_limit_auth
    description: |
      Rate-limit ALL auth endpoints: max 5 login attempts per IP per 15min.
      Max 3 password reset requests per email per 15min.
      Use sliding window, not fixed window. Log and alert on threshold breach.
      Response: 429 Too Many Requests with Retry-After header.
    triggers: [login, auth, password-reset, brute-force]

  # ── DB: SQL, migrations, query patterns ─────────────────
  - id: DB-001
    name: sql_parameterized_only
    description: |
      Never concatenate strings into SQL. Use parameterized queries 100%.
      PostgreSQL: ON CONFLICT requires unique constraint (not index). Use CREATE UNIQUE INDEX first.
      SQLite: TEXT for strings. PostgreSQL: UUID type not TEXT for IDs.
      RETURNING * for inserts (PostgreSQL), not last_insert_rowid().
    triggers: [sql, query, database, migration, select, insert, update, delete, postgresql, sqlite]

  - id: DB-002
    name: migration_seed_required
    description: |
      Fresh DB = broken login, missing seed data.
      seed-on-startup MUST be wired before any deploy.
      Seeds: always ON CONFLICT DO NOTHING (idempotent).
      Verify after deploy: query admin user exists. If not -> seed.
    triggers: [migration, new-deploy, fresh-db, reset-db, first-deploy]

  # ── API: REST, errors, validation ───────────────────────
  - id: API-001
    name: rest_error_format
    description: |
      REST errors: {error: string, code: string, details?: object}.
      HTTP status: 400=bad input, 401=unauthenticated, 403=forbidden, 404=not found, 409=conflict, 422=validation, 429=rate limited, 500=server.
      Never expose stack traces in responses. Log internally.
      FastAPI Body(): default on param (=None), NOT inside Body().
    triggers: [api, endpoint, rest, http, route, fastapi, express]

  - id: API-002
    name: input_validation_strict
    description: |
      Validate ALL input at API boundary. Never trust client data.
      Use Pydantic v2 (FastAPI), Zod (Express/Next), or class-validator (NestJS).
      Whitelist approach: define expected shape, reject everything else.
      Sanitize strings: trim, no HTML unless explicitly allowed.
    triggers: [validation, input, body, params, form, request]

  # ── CODE-QUALITY: Testing, commit, POA, review ──────────
  - id: CODE-001
    name: test_before_declare_done
    description: |
      No "fixed" without tests passing. POA must include test verification step.
      Timer-based fixes (sleep, setTimeout) flake under load - use wait_for_selector or polling.
      In-memory state: clear between tests (FastAPI TestClient: autouse fixture).
    triggers: [test, pytest, jest, vitest, coverage, verify, assertion]

  - id: CODE-002
    name: commit_convention
    description: |
      Commit format: type(scope): subject. Types: feat, fix, refactor, docs, test, chore.
      Never commit unless user explicitly asked. Never --force or --no-verify.
      Before commit: git status + git diff + git log --oneline -10.
    triggers: [commit, git, stage, push]

  - id: CODE-003
    name: poa_audit_enforced
    description: |
      Multi-file tasks: POA -> execute -> audit every item.
      Empty folders, placeholder files, missing scope = FAILURE.
      Never declare done if any POA item unchecked or audit item fails.
      Run Completion Audit against POA before reporting done.
    triggers: [multi-file, refactor, feature, scaffold, create-app, from scratch]

  # ── DEPLOY: Docker, Railway, verify after push ──────────
  - id: DEPLOY-001
    name: verify_after_push
    description: |
      After git push to deploy branch: run Verify-Deploy.ps1.
      SHA verification + route check + E2E smoke. Exit 0 = done.
      Never declare deploy done without SHA verification.
      Railway: ephemeral filesystem. Use Postgres plugin, never SQLite on disk.
    triggers: [git push, deploy, railway, docker push]

  - id: DEPLOY-002
    name: docker_security_baseline
    description: |
      Docker: never run as root. Use USER directive.
      Mount volumes as non-root. No --privileged unless explicitly justified.
      Secrets via Docker secrets or env, never baked into image.
      Multi-stage builds to minimize image size.
    triggers: [docker, dockerfile, container, docker-compose]

  # ── SECURITY: OWASP, secrets, error handling, types ─────
  - id: SEC-001
    name: no_auth_bypass
    description: |
      Skipping auth ships a security hole. Minimal auth (bcrypt + session cookie) is ~20 lines.
      Always implement auth even for "internal" tools.
      x-user-role header is spoofable - validate via DB/JWT server-side.
    triggers: [skip-auth, bypass-login, no-auth, disable-auth]

  - id: SEC-002
    name: secrets_in_env_only
    description: |
      ALL secrets in env vars or secret manager. Never in code, config files, or git.
      Use .env.example for templates (no real values).
      Rotate keys on suspected exposure. Minimum key length: 256 bits.
    triggers: [secret, env, api-key, password, token, credential]

  - id: SEC-003
    name: no_silent_failure
    description: |
      Never bare except: pass or catch {} - always log + re-raise minimum.
      Silencing errors hides bugs that WILL compound.
      Use structured logging (JSON) with trace ID for every error.
    triggers: [error, exception, catch, try-except, error-handling]

  - id: SEC-004
    name: type_strict_no_any
    description: |
      :any / as any / @ts-ignore mutes the type checker. Fix underlying type.
      Use unknown + type guards instead of any. Strict null checks enabled.
      One @ts-ignore allowed only with // EXPLAIN: comment and TODO to fix.
    triggers: [typescript, ts, type, any-type, type-escape]

  # ── UI: Responsive, accessible, design ──────────────────
  - id: UI-001
    name: responsive_mobile_first
    description: |
      Mobile-first breakpoints. Tailwind defaults: sm:640px, md:768px, lg:1024px.
      Test at 320px (small phone), 768px (tablet), 1440px (desktop).
      Never assume desktop-only. Use relative units (rem, %, vw) over px.
    triggers: [css, responsive, tailwind, layout, mobile, screen]

  - id: UI-002
    name: accessibility_minimum
    description: |
      All images: alt text. Interactive elements: focusable + keyboard navigable.
      Color contrast ratio >= 4.5:1 (normal text), >= 3:1 (large text).
      Form inputs: associated labels. Never color-alone for meaning.
      Use semantic HTML: button for actions, a for navigation, nav/header/main.
    triggers: [ui, a11y, accessibility, aria, alt-text]

  # ── COORDINATION: Routing, parallel, DAG, challenger ────
  - id: COORD-001
    name: parallel_when_multi_domain
    description: |
      Task spans 2+ independent domains: launch parallel agents simultaneously.
      frontend+backend, bug+impact, refactor+design, build+test = parallel.
      Wait for ALL agents before aggregating. Report ONE consolidated response.
      Same-file edits: do NOT parallelize (merge conflict risk).
    triggers: [frontend, backend, full-stack, api, database, deploy, multi-file]

  - id: COORD-002
    name: dag_for_complexity_4plus
    description: |
      Complexity >= 4: build task_graph BEFORE routing.
      Identify independent sub-tasks (parallel batch 1).
      Identify dependent sub-tasks (sequential batches 2-3).
      Fan-in verification: merge results, audit consistency, report once.
      Max 3 batches, 5 sub-tasks total. Fallback to linear if DAG unclear.
    triggers: [architecture, full-stack, new-project, migration, refactor]

  - id: COORD-003
    name: challenge_risky_keywords
    description: |
      Scan user message for risky keywords. One challenge sentence + alternative.
      Template: "WARNING: [risk]. Better: [alternative]. Proceed as-is? (yes/no)"
      Do NOT re-challenge same category in same session after user confirmation.
      Skip challenge if keyword in paste/quote/path or user pre-overrides.
      ⚠️ SYNC: triggers MUST match main-coordinator.md Challenger Rule keyword list.
         Add new patterns to BOTH files or the other system drifts.
    triggers: [md5, sha1, sha-1, plain-text-password, encrypt-password, custom-hash, obfuscate-password,
               skip-auth, disable-auth, bypass-login, no-auth, trust-client, skip-jwt,
               except-pass, catch-e, swallow-error, ignore-error,
               ts-ignore, any-type, noqa, type-ignore,
               force-push, git-force, no-verify, reset-hard, skip-hooks,
               add-redis, add-kafka, add-microservice, kubernetes, add-rabbitmq, add-elasticsearch,
               rewrite-in, migrate-to, new-framework,
               deploy-without-test, skip-tests, test-in-prod, just-push, fix-in-prod,
               new-deploy, fresh-database, empty-db, reset-db,
               sleep(, setTimeout, wait-for-timeout, time-sleep,
               pip-install, npm-install]

  # ── MINIMAX: Media generation, Office files ─────────────
  - id: MMX-001
    name: minimax_cli_media
    description: |
      Use mmx-cli for MiniMax API: text, image, video, speech, music.
      Syntax: mmx gen [type] --prompt "...". Check API key rotation status.
      Key prefix sk-cp- indicates session key - verify validity before calls.
    triggers: [generate-image, generate-video, speech, music, mmx]

  - id: MMX-002
    name: office_file_programmatic
    description: |
      Office files: programmatic generation only. openpyxl (Excel), python-docx (Word), PptxGenJS (PowerPoint).
      No manual XML editing of .xlsx/.docx/.pptx.
      For templates: use python-docx template engine or PptxGenJS slide layouts.
    triggers: [excel, spreadsheet, xlsx, word, docx, pptx, presentation]

  # ── PERFORMANCE: Queries, cache, optimization ───────────
  - id: PERF-001
    name: optimize_queries_cache
    description: |
      ORM N+1: use eager loading (joinedload, select_related, include).
      DB: index columns used in WHERE/JOIN/ORDER BY. Use EXPLAIN ANALYZE.
      Cache: Redis for hot data. Cache invalidation on write, not TTL-only.
      Frontend: lazy load routes, code split >100KB bundles.
    triggers: [slow, n+1, query, optimize, cache, performance]

  # ── EVOLUTION: Self-improvement loop ────────────────────
  - id: EVO-001
    name: evolution_post_session
    description: |
      After every 10 completed tasks: scan session_log.md for repetition patterns.
      If pattern spans 3+ agents -> propose new Skill.
      If pattern is 1 specific behavior -> auto-write new Gene to DNA.yaml.
      Report: "DNA: N genes created, M pending approval."
      Never modify application code. Config-only. User approval required.
    triggers: [post-session, evolution-check, analyze-performance]

  # ── COORDINATION: Identity injection ──────────────────
  - id: COORD-004
    name: inject_agent_identity
    description: |
      Before routing ANY task to a sub-agent, inject ID-JAG identity block.
      Identity is scoped per-task: one task = one identity. TTL 5min.
      No identity injection for Trivial (score 0) tasks.
    triggers: [dispatch, route, handover, delegate, task, sub-agent, specialist]

  # ── COORDINATION: Graph consultation ──────────────────
  - id: COORD-005
    name: consult_context_graph
    description: |
      Before routing Moderate+ tasks (score 4+), consult context graph
      for relevant decisions, lessons, and blockers.
      Query: graph-memory.js query --type recent --domain "domain from task"
      Skip gracefully if no graph engine installed.
    triggers: [route, moderate, complex, dispatch, decision, task-graph]

  # ── TRIGGERS: Graph writes ────────────────────────────
  - id: TRIGGER-002
    name: write_decisions_to_graph
    description: |
      On T6 (Decision made), T2 (Task completes), T5 (Lesson discovered):
      ALSO write to context graph in addition to flat files.
      Fire-and-forget — do NOT block task flow on graph writes.
      Fallback: skip if graph-memory.js not available.
    triggers: [t2, t5, t6, decision, lesson, task-complete, session-end]

  # AUTO-GENERATED GENE
  # Retro-analyze: 1 tasks blocked on step 'verify' (3+ attempts each)
  - id: CODE-AUTO-001
    name: CODE_gate_blocked_verify
    description: |
      Gate system: step 'verify' blocked 3+ times. Pattern: 1 tasks blocked on step 'verify' (3+ attempts each). Reason: test_integration. Tasks: integration-test-task. Auto-created by retro-analyze after 10-task scan.
    triggers: ["verify", "gate", "blocked", "attempts"]
    auto_generated: true
    auto_date: "2026-06-01T08:16:43.0205288-04:00"
    auto_reason: "test_integration"
# ── GENE LOADER — How agents load genes ──────────────────
gene_loader:
  algorithm: |
    1. Pre-load all genes in session_start_genes (always present in context).
    2. Parse task -> extract keywords from user message.
    3. Match against triggers in DNA.yaml.
    4. Select top 10 matching genes max (score by keyword overlap, excluding session_start_genes which are already loaded).
    5. Inject matched genes into agent prompt as "DNA CONTEXT" block.
  session_start:
    - Always loaded at session init before any task.
    - Stored in session context, not re-queried per task.
    - Prevents repetitive loading of identity genes.
  max_genes_per_load: 10
  fallback: If no genes match, proceed without DNA loading.

# ── AGENT -> GENE MAPPING ───────────────────────────────
# Families are derived from gene ID prefixes:
# AUTH, DB, API, CODE, DEPLOY, SEC, UI, COORD, MMX, PERF, EVO, GENE
# This map controls which agent loads which family.
agent_gene_map:
  main-coordinator: [GENE, COORD]
  code-builder: [AUTH, DB, API, CODE, DEPLOY, SEC, UI, MMX, PERF]
  bug-fixer: [AUTH, DB, CODE, SEC, PERF]
  code-analyzer: [CODE, SEC, PERF]
  architecture-advisor: [AUTH, DB, API, DEPLOY, SEC, PERF]
  code-explainer: [GENE]
  project-generator: [all]
  evolution-agent: [EVO]
  skill-manager: [EVO]
  standup-summary: [GENE]

# ── EVOLUTION MISSION ───────────────────────────────────
evolution:
  trigger: after_every_10_tasks_or_explicit
  agent: evolution-agent
  mission:
    step_1: |
      Scan session_log.md -> identify agents/tasks repeating patterns.
    step_2: |
      If pattern spans 3+ agents -> propose new Skill (200-line SKILL.md).
    step_3: |
      If pattern is 1 specific agent behavior -> auto-write Gene to DNA.yaml.
    step_4: |
      Report format: "DNA: N genes created, M pending approval."
  gene_template: |
    - id: <PREFIX-XXX>
      name: <behavior_name>
      description: | <10 lines max, concrete rule>
      triggers: [k1, k2, k3]