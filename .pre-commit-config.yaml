# Pre-commit hooks for OpenCode config validation
# Install: pip install pre-commit && pre-commit install
# Run manually: pre-commit run --all-files
#
# Validates:
#   - DNA.yaml gene ID format (zod schema via bun/node test)
#   - YAML syntax of all .yaml files
#   - No merge conflict markers
#   - No trailing whitespace
#   - Plugin files have valid syntax

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-yaml
        files: 'skills/DNA\.yaml$|.*\.yaml$'
      - id: check-merge-conflict
      - id: trailing-whitespace
      - id: end-of-file-fixer

  - repo: local
    hooks:
      - id: dna-gene-schema
        name: DNA.yaml gene schema validation
        description: Validate DNA.yaml genes against the zod schema
        entry: bash -c 'cd "$REPO_ROOT/plugins" && node --test gate-system.test.js 2>&1 | grep -E "^(âœ”|âœ–|â„¹ tests|â„¹ pass|â„¹ fail)" | grep -v "â„¹ cancelled"'
        language: system
        files: 'skills/DNA\.yaml$'
        pass_filenames: false
        require_serial: true

      - id: plugin-syntax
        name: Plugin JS syntax check
        description: Verify all plugin files parse as valid JavaScript
        entry: bash -c 'for f in "$REPO_ROOT/plugins"/*.js; do node --check "$f" || exit 1; done'
        language: system
        files: 'plugins/.*\.js$'
        pass_filenames: false
